<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGenuis Login</title>
    <script src="./script/login.js" defer></script>
    <link rel="stylesheet" href="./style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</head>
<body>
<!-- navbar section-->
   <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <ul class="navbar-nav mx-auto text-center">
        <li class="nav-item brand-item">
          <a class="nav-link brand-logo" href="./index.html">GeoGenius 🌍</a>
        </li>
      </ul>
    </div>
  </nav>
  <!-- login section -->
<section id="login_section">
  <div class="login-card">
    <h1 class="text-center mb-4">Log In</h1>

    <form id="form_login">
      <div class="mb-3">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" class="form-control" />
        <small id="email_error" class="error-text"></small>
      </div>

      <div class="mb-3">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" class="form-control" />
        <small id="password_error" class="error-text"></small>
      </div>

      <div class="login-links">
        <a href="forgot_password.html">Forgot Password?</a>
      </div>

      <input type="submit" value="Login" class="btn login-btn" />

      <div class="signup-text">
        <span>Don't have an account? </span>
        <a href="signup.html">Sign up</a>
      </div>
    </form>
  </div>
</section>

    
</body>
</html>
