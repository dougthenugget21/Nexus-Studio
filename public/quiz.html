<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGenius Quiz</title>
    <link rel="stylesheet" href="style/quizstyle.css">
    <script src="script/quiz.js" defer></script>
</head>
<body>
    <div class="container">
        <div id="div_Category_name"></div>
        <button class="exit-button" onclick="window.location.href='homepage.html'">Exit Quiz</button>
        <div class="central-image">
        <img src="./img/world.png" id="quiz-category-image" alt="">
    </div>
    <button class="next-button" id="nextButton">Next</button>

    <div class="question-box" id="question"></div>

        <div class="answers-container">
            <div class="answer-row">
                <button class="answer-box answer1" id="option_1"></button>
                <button class="answer-box answer3" id="option_2"></button>
            </div>
            <div class="answer-row">
                <button class="answer-box answer2" id="option_3"></button>
                <button class="answer-box answer4" id="option_4"></button>
            </div>
        </div>
    </div>
    <div id="resultPopup">
    
    <div id = "div_popdetail">
        <h2>Quiz Completed 🎉</h2>
        <p id="finalScore"></p>
        <button id="okBtn">OK</button>
    </div>

</div>
</body>
</html>
