<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGenius Quiz</title>
    <link rel="stylesheet" href="style/quizstyle.css">
    <script src="script/quiz.js" defer></script>
</head>
<body>
    <div class="container">
        <button class="exit-button" onclick="window.location.href='homepage.html'">Exit Quiz</button>
        <div class="central-image">
        <img src="./img/world.png" alt="">
    </div>

    <button class="next-button">Next</button>

    <div class="question-box" id="question"></div>

        <div class="answers-container">
            <div class="answer-row">
                <div class="answer-box answer1" id="option_1"></div>
                <div class="answer-box answer3" id="option_2"></div>
            </div>
            <div class="answer-row">
                <div class="answer-box answer2" id="option_3"></div>
                <div class="answer-box answer4" id="option_4"></div>
            </div>
        </div>

    <div id="feedback" class="feedback" style="display: node;"></div>
</div>
</body>
</html>
