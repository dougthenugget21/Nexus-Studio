<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGenius Sign Up</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="./style/style.css" />
  <script src="./script/signup.js" defer></script>
</head>

<body>
   <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <ul class="navbar-nav mx-auto text-center">
        <li class="nav-item brand-item">
          <a class="nav-link brand-logo" href="./homepage.html">GeoGenius 🌍</a>
        </li>
      </ul>
    </div>
  </nav>

  <section id="signup_section" class="signup-background">
    <div class="login-card">
        <h1 class="text-center">Register</h1>
      <form id="form_signup">
        <div class="mb-3">
          <label for="first_name" class="form-label">First Name:</label>
          <input type="text" id="first_name" name="first_name" class="form-control" />
          <small id="firstName_error" class="error-text"></small>
        </div>

        <div class="mb-3">
          <label for="last_name" class="form-label">Last Name:</label>
          <input type="text" id="last_name" name="last_name" class="form-control" />
          <small id="lastName_error" class="error-text"></small>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email:</label>
          <input type="email" id="email" name="email" class="form-control" />
          <small id="email_error" class="error-text"></small>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password:</label>
          <input type="password" id="password" name="password" class="form-control" />
          <small id="password_error" class="error-text"></small>
        </div>

        <div class="password-rules mb-3">
          <small id="rule_length">• At least 8 characters</small><br />
          <small id="rule_letter">• At least 1 alphabet</small><br />
          <small id="rule_number">• At least 1 number</small><br />
          <small id="rule_special">• At least 1 special character</small>
        </div>

        <div class="mb-3">
          <label for="confirm_password" class="form-label">Confirm Password:</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            class="form-control"
          />
          <small id="confirmPassword_error" class="error-text"></small>
        </div>

        <input type="submit" value="Sign Up" class="btn category-btn login-btn w-100" />

        <div class="signup-text text-center mt-3">
          <span>Already have an account? </span>
          <a href="login.html">Log in</a>
        </div>
      </form>
    </div>
  </section>

</body>
</html>
